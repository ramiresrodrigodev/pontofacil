<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PontoFácil – Sistema de RH</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;
  --border:#2a3347;--border2:#3a4660;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#2563eb;--accent-bg:#1e3a5f;
  --green:#22c55e;--green-bg:#14532d;
  --yellow:#eab308;--yellow-bg:#422006;
  --red:#ef4444;--red-bg:#450a0a;
  --purple:#a855f7;--purple-bg:#3b0764;
  --cyan:#06b6d4;--cyan-bg:#0c4a6e;
  --bottom-nav:60px;
}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:16px;background:var(--bg);padding-bottom:calc(var(--bottom-nav) + 16px)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;transition:color .15s;padding:6px 2px}
.bnav-item i{font-size:20px}
.bnav-item.active{color:var(--accent)}
@media(min-width:768px){
  .app{flex-direction:row}
  .bottom-nav{display:none}
  .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .content{padding:24px;padding-bottom:24px}
}
.sidebar{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-size:18px;font-weight:700;color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav{padding:12px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-item i{font-size:16px;width:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:767px){
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
}
@media(max-width:400px){.grid-3{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:22px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.section-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-blue{background:var(--accent-bg);color:var(--accent)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-cyan{background:var(--cyan-bg);color:var(--cyan)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:none;font-weight:500;transition:all .15s;touch-action:manipulation}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none}
.input:focus{border-color:var(--accent)}
.select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;cursor:pointer}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:10px 12px;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:500}
.table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.table tr:last-child td{border-bottom:none}
.mobile-list{display:none}
.desktop-table{display:block}
@media(max-width:767px){.mobile-list{display:flex;flex-direction:column;gap:8px}.desktop-table{display:none}}
.mcard{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90dvh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
@media(min-width:600px){.modal-overlay{align-items:center}.modal{border-radius:12px;width:500px;max-width:95vw}}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.alert-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.alert-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow)}
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:8px;margin-bottom:16px;overflow-x:auto}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2);font-weight:500;white-space:nowrap}
.tab.active{background:var(--bg2);color:var(--text)}
.horas-bar{height:6px;border-radius:3px;background:var(--bg4);overflow:hidden;margin-top:6px}
.horas-fill{height:100%;border-radius:3px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-bg);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ponto-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ponto-btn{padding:14px 8px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:none;transition:all .15s;touch-action:manipulation}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const ini_func=[
  {id:1,nome:'Ana Lima',cargo:'Desenvolvedora',departamento:'TI',salario:8500,contrato:'CLT',status:'Ativo',email:'ana@empresa.com',telefone:'11 99999-0001',dataAdmissao:'2022-03-01',escala:'5x2'},
  {id:2,nome:'Bruno Costa',cargo:'Designer',departamento:'Marketing',salario:6200,contrato:'CLT',status:'Ativo',email:'bruno@empresa.com',telefone:'11 99999-0002',dataAdmissao:'2021-07-15',escala:'5x2'},
  {id:3,nome:'Carla Souza',cargo:'Analista Financeiro',departamento:'Financeiro',salario:7800,contrato:'CLT',status:'Ativo',email:'carla@empresa.com',telefone:'11 99999-0003',dataAdmissao:'2023-01-10',escala:'5x2'},
  {id:4,nome:'Daniel Rocha',cargo:'Estágio em TI',departamento:'TI',salario:1800,contrato:'Estágio',status:'Ativo',email:'daniel@empresa.com',telefone:'11 99999-0004',dataAdmissao:'2024-02-01',escala:'5x2'},
  {id:5,nome:'Emília Nunes',cargo:'Consultora PJ',departamento:'Comercial',salario:12000,contrato:'PJ',status:'Inativo',email:'emilia@empresa.com',telefone:'11 99999-0005',dataAdmissao:'2020-05-20',escala:'5x2'},
];
const ini_pontos=[
  {id:1,funcionarioId:1,data:'2025-06-02',entrada:'08:02',almocoSaida:'12:05',almocoRetorno:'13:10',saida:'17:30',status:'Completo'},
  {id:2,funcionarioId:1,data:'2025-06-03',entrada:'08:15',almocoSaida:'12:00',almocoRetorno:'13:05',saida:'17:45',status:'Completo'},
  {id:3,funcionarioId:2,data:'2025-06-02',entrada:'09:00',almocoSaida:'12:30',almocoRetorno:'13:30',saida:'18:00',status:'Completo'},
  {id:4,funcionarioId:2,data:'2025-06-03',entrada:'09:20',almocoSaida:'12:30',almocoRetorno:'13:30',saida:'18:10',status:'Completo'},
  {id:5,funcionarioId:3,data:'2025-06-03',entrada:'07:55',almocoSaida:'12:00',almocoRetorno:'13:00',saida:'17:00',status:'Completo'},
];
const ini_folgas=[
  {id:1,funcionarioId:1,tipo:'Férias',inicio:'2025-07-01',fim:'2025-07-15',status:'Aprovado',obs:'Férias anuais'},
  {id:2,funcionarioId:2,tipo:'Atestado',inicio:'2025-06-01',fim:'2025-06-01',status:'Aprovado',obs:'Consulta médica'},
  {id:3,funcionarioId:3,tipo:'Folga semanal',inicio:'2025-06-07',fim:'2025-06-07',status:'Aprovado',obs:''},
  {id:4,funcionarioId:4,tipo:'Banco de horas',inicio:'2025-06-05',fim:'2025-06-05',status:'Pendente',obs:'Compensação horas extras'},
];
const fmtDate=d=>d.toLocaleDateString('pt-BR');
const fmtTime=d=>d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmtH=min=>{const h=Math.floor(min/60),m=min%60;return`${h}h${m>0?String(m).padStart(2,'0')+'min':''}`};
const ini=n=>n.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase();
const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m};

function App(){
  const[page,setPage]=useState('dashboard');
  const[funcs,setFuncs]=useState(ini_func);
  const[pontos,setPontos]=useState(ini_pontos);
  const[folgas,setFolgas]=useState(ini_folgas);
  const[pa,setPa]=useState({});
  const[alert,setAlert]=useState(null);
  const[clock,setClock]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{if(alert){const t=setTimeout(()=>setAlert(null),3000);return()=>clearTimeout(t)}},[alert]);
  const showAlert=(msg,type='green')=>setAlert({msg,type});
  const nav=[
    {id:'dashboard',icon:'ti-layout-dashboard',label:'Início'},
    {id:'funcionarios',icon:'ti-users',label:'Equipe'},
    {id:'ponto',icon:'ti-clock',label:'Ponto'},
    {id:'folgas',icon:'ti-beach',label:'Folgas'},
    {id:'relatorios',icon:'ti-chart-bar',label:'Relatórios'},
    {id:'escalas',icon:'ti-calendar-month',label:'Escalas'},
  ];
  const ativos=funcs.filter(f=>f.status==='Ativo').length;
  const totalMin=pontos.reduce((a,p)=>{if(!p.entrada||!p.saida)return a;let m=toMin(p.saida)-toMin(p.entrada);if(p.almocoSaida&&p.almocoRetorno)m-=(toMin(p.almocoRetorno)-toMin(p.almocoSaida));return a+m},0);
  const pendentes=folgas.filter(f=>f.status==='Pendente').length;
  return(
    <div className="app">
      <aside className="sidebar">
        <div className="logo"><div className="logo-text">PontoFácil</div><div className="logo-sub">Sistema de RH</div></div>
        <nav className="nav">{nav.map(p=><div key={p.id} className={`nav-item${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}><i className={`ti ${p.icon}`}></i><span>{p.label}</span></div>)}</nav>
        <div style={{padding:'12px 8px',borderTop:'1px solid var(--border)'}}><div className="nav-item"><i className="ti ti-settings"></i><span>Configurações</span></div></div>
      </aside>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{nav.find(p=>p.id===page)?.label}</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:'var(--text3)'}}>{fmtTime(clock)}</span>
            <div className="avatar" style={{width:28,height:28,fontSize:10}}>GE</div>
          </div>
        </div>
        {alert&&<div style={{padding:'10px 16px 0'}}><div className={`alert alert-${alert.type}`}>{alert.msg}</div></div>}
        <div className="content">
          {page==='dashboard'&&<Dashboard funcs={funcs} pontos={pontos} folgas={folgas} ativos={ativos} totalMin={totalMin} pendentes={pendentes} setPage={setPage}/>}
          {page==='funcionarios'&&<Funcionarios funcs={funcs} setFuncs={setFuncs} showAlert={showAlert}/>}
          {page==='ponto'&&<Ponto funcs={funcs} pontos={pontos} setPontos={setPontos} pa={pa} setPa={setPa} showAlert={showAlert} clock={clock}/>}
          {page==='escalas'&&<Escalas funcs={funcs} setFuncs={setFuncs} showAlert={showAlert}/>}
          {page==='folgas'&&<Folgas funcs={funcs} folgas={folgas} setFolgas={setFolgas} showAlert={showAlert}/>}
          {page==='relatorios'&&<Relatorios funcs={funcs} pontos={pontos} folgas={folgas}/>}
        </div>
      </div>
      <nav className="bottom-nav">
        {nav.map(p=><div key={p.id} className={`bnav-item${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}><i className={`ti ${p.icon}`}></i><span>{p.label}</span></div>)}
      </nav>
    </div>
  );
}

function Dashboard({funcs,pontos,folgas,ativos,totalMin,pendentes,setPage}){
  return(
    <div>
      <div className="grid-4" style={{marginBottom:14}}>
        <div className="stat-card"><div className="stat-label">Ativos</div><div className="stat-value">{ativos}</div><div className="stat-sub">{funcs.length} total</div></div>
        <div className="stat-card"><div className="stat-label">Horas/mês</div><div className="stat-value">{Math.floor(totalMin/60)}h</div><div className="stat-sub">registradas</div></div>
        <div className="stat-card"><div className="stat-label">Pendentes</div><div className="stat-value" style={{color:pendentes>0?'var(--yellow)':undefined}}>{pendentes}</div><div className="stat-sub">folgas</div></div>
        <div className="stat-card"><div className="stat-label">Pontos</div><div className="stat-value">{pontos.length}</div><div className="stat-sub">registros</div></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="section-title">Últimos registros</div>
        {[...pontos].reverse().slice(0,4).map(p=>{
          const f=funcs.find(f=>f.id===p.funcionarioId);
          return(
            <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div className="avatar" style={{width:28,height:28,fontSize:10}}>{f?ini(f.nome):'?'}</div>
                <div><div style={{fontSize:13,fontWeight:500}}>{f?.nome}</div><div style={{fontSize:11,color:'var(--text3)'}}>{p.data}</div></div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,color:'var(--text2)'}}>{p.entrada} → {p.saida||'—'}</div>
                <span className={`badge ${p.status==='Completo'?'badge-green':'badge-yellow'}`} style={{fontSize:10}}>{p.status}</span>
              </div>
            </div>
          );
        })}
        <button className="btn btn-secondary btn-block" style={{marginTop:10,fontSize:12}} onClick={()=>setPage('ponto')}>Ver todos</button>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="section-title">Próximas folgas</div>
        {folgas.filter(f=>f.status==='Aprovado').slice(0,3).map(f=>{
          const func=funcs.find(fu=>fu.id===f.funcionarioId);
          return(
            <div key={f.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{func?.nome}</div><div style={{fontSize:11,color:'var(--text3)'}}>{f.inicio} • {f.tipo}</div></div>
              <span className="badge badge-green">Aprovado</span>
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="section-title">Equipe ativa</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {funcs.filter(f=>f.status==='Ativo').map(f=><span key={f.id} className="chip"><div className="avatar" style={{width:18,height:18,fontSize:8}}>{ini(f.nome)}</div>{f.nome.split(' ')[0]}</span>)}
        </div>
      </div>
    </div>
  );
}

function Funcionarios({funcs,setFuncs,showAlert}){
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({nome:'',cargo:'',departamento:'',salario:'',contrato:'CLT',status:'Ativo',email:'',telefone:'',dataAdmissao:'',escala:'5x2'});
  const[filtro,setFiltro]=useState('');
  const[fs,setFs]=useState('Todos');
  const abrir=f=>{setForm(f?{...f,salario:f.salario.toString()}:{nome:'',cargo:'',departamento:'',salario:'',contrato:'CLT',status:'Ativo',email:'',telefone:'',dataAdmissao:'',escala:'5x2'});setModal(f?'editar':'novo')};
  const salvar=()=>{
    if(!form.nome||!form.cargo){showAlert('Preencha nome e cargo.','red');return}
    if(modal==='novo'){setFuncs(p=>[...p,{...form,id:Date.now(),salario:Number(form.salario)||0}]);showAlert('Cadastrado!');}
    else{setFuncs(p=>p.map(f=>f.id===form.id?{...form,salario:Number(form.salario)||0}:f));showAlert('Atualizado!');}
    setModal(null);
  };
  const lista=funcs.filter(f=>(fs==='Todos'||f.status===fs)&&(f.nome.toLowerCase().includes(filtro.toLowerCase())||f.cargo.toLowerCase().includes(filtro.toLowerCase())));
  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input className="input" style={{flex:1}} placeholder="Buscar..." value={filtro} onChange={e=>setFiltro(e.target.value)}/>
        <select className="select" style={{width:110}} value={fs} onChange={e=>setFs(e.target.value)}><option>Todos</option><option>Ativo</option><option>Inativo</option></select>
      </div>
      <button className="btn btn-primary btn-block" style={{marginBottom:12}} onClick={()=>abrir(null)}><i className="ti ti-plus"></i>Novo Funcionário</button>
      <div className="mobile-list">
        {lista.map(f=>(
          <div key={f.id} className="mcard">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div className="avatar">{ini(f.nome)}</div>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{f.nome}</div><div style={{fontSize:12,color:'var(--text3)'}}>{f.cargo} • {f.departamento}</div></div>
              <span className={`badge ${f.status==='Ativo'?'badge-green':'badge-red'}`}>{f.status}</span>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
              <span className={`badge ${f.contrato==='CLT'?'badge-blue':f.contrato==='PJ'?'badge-purple':'badge-cyan'}`}>{f.contrato}</span>
              <span className="chip" style={{fontSize:11}}>{f.escala}</span>
              <span style={{fontSize:12,color:'var(--text2)'}}>R$ {Number(f.salario).toLocaleString('pt-BR')}</span>
            </div>
            <div style={{display:'flex',gap:8}}>

function Ponto({funcs,pontos,setPontos,pa,setPa,showAlert,clock}){
  const[sel,setSel]=useState('');
  const[tab,setTab]=useState('registrar');
  const[mm,setMm]=useState(false);
  const[fm,setFm]=useState({funcionarioId:'',data:'',entrada:'',almocoSaida:'',almocoRetorno:'',saida:'',obs:''});
  const reg=tipo=>{
    if(!sel){showAlert('Selecione um funcionário','red');return}
    const id=parseInt(sel),agora=fmtTime(clock),hoje=clock.toISOString().slice(0,10);
    if(tipo==='saida'){
      const at=pa[id]||{};
      setPontos(p=>[...p,{id:Date.now(),funcionarioId:id,data:hoje,...at,saida:agora,status:'Completo'}]);
      setPa(p=>{const n={...p};delete n[id];return n});showAlert('Jornada finalizada!');
    }else{
      setPa(p=>({...p,[id]:{...(p[id]||{}),[tipo]:agora,data:hoje}}));
      showAlert(`${tipo==='entrada'?'Entrada':tipo==='almocoSaida'?'Saída almoço':'Retorno'} às ${agora}`);
    }
  };
  const ativo=sel?pa[parseInt(sel)]:null;
  const btns=[
    {tipo:'entrada',label:'Entrada',icon:'ti-login',dis:!!(ativo?.entrada)},
    {tipo:'almocoSaida',label:'Saída Almoço',icon:'ti-soup',dis:!ativo?.entrada||!!(ativo?.almocoSaida)},
    {tipo:'almocoRetorno',label:'Retorno',icon:'ti-arrow-back-up',dis:!ativo?.almocoSaida||!!(ativo?.almocoRetorno)},
    {tipo:'saida',label:'Saída Final',icon:'ti-logout',dis:!ativo?.entrada},
  ];
  const salvarM=()=>{
    if(!fm.funcionarioId||!fm.data||!fm.entrada){showAlert('Preencha os campos obrigatórios','red');return}
    setPontos(p=>[...p,{id:Date.now(),...fm,funcionarioId:parseInt(fm.funcionarioId),status:fm.saida?'Completo':'Incompleto'}]);
    setMm(false);showAlert('Ponto registrado!');
  };
  return(
    <div>
      <div className="tabs">
        <div className={`tab${tab==='registrar'?' active':''}`} onClick={()=>setTab('registrar')}>Registrar</div>
        <div className={`tab${tab==='equipe'?' active':''}`} onClick={()=>setTab('equipe')}>Equipe hoje</div>
        <div className={`tab${tab==='historico'?' active':''}`} onClick={()=>setTab('historico')}>Histórico</div>
      </div>
      {tab==='registrar'&&(
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="form-group"><label className="form-label">Funcionário</label><select className="select" value={sel} onChange={e=>setSel(e.target.value)}><option value="">Selecione...</option>{funcs.filter(f=>f.status==='Ativo').map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select></div>
            <div className="ponto-grid">
              {btns.map(b=><button key={b.tipo} className={`ponto-btn ${b.dis?'btn-secondary':'btn-primary'}`} style={{opacity:b.dis?0.4:1,cursor:b.dis?'not-allowed':'pointer'}} disabled={b.dis} onClick={()=>reg(b.tipo)}><i className={`ti ${b.icon}`} style={{display:'block',fontSize:20,marginBottom:4}}></i>{b.label}</button>)}
            </div>
          </div>
          {sel&&ativo&&(
            <div className="card" style={{marginBottom:12}}>
              <div className="section-title">Status de hoje</div>
              {['entrada','almocoSaida','almocoRetorno'].map(t=><div key={t} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:13,color:'var(--text2)'}}>{t==='entrada'?'Entrada':t==='almocoSaida'?'Saída almoço':'Retorno'}</span><span style={{fontWeight:600,color:ativo[t]?'var(--green)':'var(--text3)'}}>{ativo[t]||'—'}</span></div>)}
            </div>
          )}
          <button className="btn btn-secondary btn-block" onClick={()=>setMm(true)}><i className="ti ti-edit"></i>Registro Manual (Gestor)</button>
        </div>
      )}
      {tab==='equipe'&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {funcs.filter(f=>f.status==='Ativo').map(f=>{
            const p2=pa[f.id],ph=pontos.find(p=>p.funcionarioId===f.id&&p.data===clock.toISOString().slice(0,10)&&p.status==='Completo'),d=p2||ph;
            return(
              <div key={f.id} className="mcard">
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <div className="avatar">{ini(f.nome)}</div>
                  <div style={{flex:1}}><div style={{fontWeight:600}}>{f.nome}</div><div style={{fontSize:11,color:'var(--text3)'}}>{f.cargo}</div></div>
                  {ph?<span className="badge badge-green">Finalizado</span>:p2?<span className="badge badge-yellow">Em andamento</span>:<span className="badge badge-red">Ausente</span>}
                </div>
                {d&&<div style={{display:'flex',gap:12,fontSize:12,color:'var(--text2)',flexWrap:'wrap'}}>
                  <span>Entrada: <strong style={{color:'var(--text)'}}>{d.entrada||'—'}</strong></span>
                  <span>Almoço: <strong style={{color:'var(--text)'}}>{d.almocoSaida||'—'}</strong></span>
                  <span>Retorno: <strong style={{color:'var(--text)'}}>{d.almocoRetorno||'—'}</strong></span>
                </div>}
              </div>
            );
          })}
        </div>
      )}
      {tab==='historico'&&(
        <div>
          <div className="mobile-list">
            {[...pontos].reverse().map(p=>{
              const f=funcs.find(f=>f.id===p.funcionarioId);
              let m=0;if(p.entrada&&p.saida){m=toMin(p.saida)-toMin(p.entrada);if(p.almocoSaida&&p.almocoRetorno)m-=(toMin(p.almocoRetorno)-toMin(p.almocoSaida))}
              const ex=m>480?m-480:0;
              return(
                <div key={p.id} className="mcard">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}><div className="avatar" style={{width:26,height:26,fontSize:9}}>{f?ini(f.nome):'?'}</div><div><div style={{fontWeight:600,fontSize:13}}>{f?.nome}</div><div style={{fontSize:11,color:'var(--text3)'}}>{p.data}</div></div></div>
                    <span className={`badge ${p.status==='Completo'?'badge-green':'badge-yellow'}`}>{p.status}</span>
                  </div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',fontSize:12,color:'var(--text2)'}}>
                    <span>Entrada: <strong style={{color:'var(--text)'}}>{p.entrada||'—'}</strong></span>
                    <span>Saída: <strong style={{color:'var(--text)'}}>{p.saida||'—'}</strong></span>
                    {m>0&&<span>Total: <strong style={{color:ex>0?'var(--green)':'var(--text)'}}>{fmtH(m)}{ex>0?` (+${fmtH(ex)})`:''}</strong></span>}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="desktop-table"><div className="card" style={{padding:0}}>
            <table className="table"><thead><tr><th>Funcionário</th><th>Data</th><th>Entrada</th><th>Almoço</th><th>Retorno</th><th>Saída</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>{[...pontos].reverse().map(p=>{
              const f=funcs.find(f=>f.id===p.funcionarioId);let m=0;
              if(p.entrada&&p.saida){m=toMin(p.saida)-toMin(p.entrada);if(p.almocoSaida&&p.almocoRetorno)m-=(toMin(p.almocoRetorno)-toMin(p.almocoSaida))}
              return(<tr key={p.id}><td>{f?.nome||'—'}</td><td>{p.data}</td><td>{p.entrada||'—'}</td><td>{p.almocoSaida||'—'}</td><td>{p.almocoRetorno||'—'}</td><td>{p.saida||'—'}</td><td style={{color:m>480?'var(--green)':undefined}}>{m>0?fmtH(m):'—'}</td><td><span className={`badge ${p.status==='Completo'?'badge-green':'badge-yellow'}`}>{p.status}</span></td></tr>);
            })}</tbody></table>
          </div></div>
        </div>
      )}
      {mm&&(
        <div className="modal-overlay" onClick={()=>setMm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Registro Manual</div>
            <div className="form-group"><label className="form-label">Funcionário *</label><select className="select" value={fm.funcionarioId} onChange={e=>setFm({...fm,funcionarioId:e.target.value})}><option value="">Selecione...</option>{funcs.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select></div>
            <div className="form-group"><label className="form-label">Data *</label><input className="input" type="date" value={fm.data} onChange={e=>setFm({...fm,data:e.target.value})}/></div>
            <div className="grid-2">
              <div className="form-group"><label className="form-label">Entrada *</label><input className="input" type="time" value={fm.entrada} onChange={e=>setFm({...fm,entrada:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Saída almoço</label><input className="input" type="time" value={fm.almocoSaida} onChange={e=>setFm({...fm,almocoSaida:e.target.value})}/></div>
            </div>
            <div className="grid-2">
              <div className="form-group"><label className="form-label">Retorno</label><input className="input" type="time" value={fm.almocoRetorno} onChange={e=>setFm({...fm,almocoRetorno:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Saída final</label><input className="input" type="time" value={fm.saida} onChange={e=>setFm({...fm,saida:e.target.value})}/></div>
            </div>
            <div className="form-group"><label className="form-label">Observação</label><input className="input" value={fm.obs} placeholder="Motivo..." onChange={e=>setFm({...fm,obs:e.target.value})}/></div>
            <div className="modal-actions"><button className="btn btn-secondary" onClick={()=>setMm(false)}>Cancelar</button><button className="btn btn-primary" onClick={salvarM}>Salvar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function Escalas({funcs,setFuncs,showAlert}){
  const ed={'5x2':{label:'5x2 — Seg a Sex',e:'08:00',s:'17:00',a:'1h',d:'5 dias',c:40},'6x1':{label:'6x1 — Seg a Sáb',e:'08:00',s:'16:00',a:'1h',d:'6 dias',c:44},'12x36':{label:'12x36 — Dia sim/não',e:'07:00',s:'19:00',a:'1h',d:'alternado',c:42},'Personalizada':{label:'Personalizada',e:'—',s:'—',a:'—',d:'—',c:0}};

              <div><span style={{color:'var(--text3)'}}>Saída: </span><strong>{e.s}</strong></div>
              <div><span style={{color:'var(--text3)'}}>Almoço: </span><strong>{e.a}</strong></div>
              <div><span style={{color:'var(--text3)'}}>Dias: </span><strong>{e.d}</strong></div>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {funcs.filter(f=>f.escala===k&&f.status==='Ativo').map(f=><span key={f.id} className="chip" style={{fontSize:11}}>{f.nome.split(' ')[0]}</span>)}
              {funcs.filter(f=>f.escala===k&&f.status==='Ativo').length===0&&<span style={{fontSize:12,color:'var(--text3)'}}>Nenhum funcionário</span>}
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="section-title">Alterar escala</div>
        <div className="form-group"><label className="form-label">Funcionário</label><select className="select" value={fe} onChange={e=>setFe(e.target.value)}><option value="">Selecione...</option>{funcs.filter(f=>f.status==='Ativo').map(f=><option key={f.id} value={f.id}>{f.nome} ({f.escala})</option>)}</select></div>
        <div className="form-group"><label className="form-label">Nova escala</label><select className="select" value={ne} onChange={e=>setNe(e.target.value)}><option>5x2</option><option>6x1</option><option>12x36</option><option>Personalizada</option></select></div>
        <button className="btn btn-primary btn-block" onClick={salvar}><i className="ti ti-check"></i>Aplicar Escala</button>
      </div>

function Folgas({funcs,folgas,setFolgas,showAlert}){

                  <button className="btn btn-danger btn-sm" onClick={()=>{setFolgas(p=>p.map(x=>x.id===f.id?{...x,status:'Recusado'}:x));showAlert('Recusado.','red')}}><i className="ti ti-x"></i></button>
                </div>}
              </div>
              {f.obs&&<div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>{f.obs}</div>}

            <div className="form-group"><label className="form-label">Observação</label><input className="input" value={form.obs} placeholder="Justificativa..." onChange={e=>setForm({...form,obs:e.target.value})}/></div>

          </div>

  );

function Relatorios({funcs,pontos,folgas}){
  const[sel,setSel]=useState('');const[mes,setMes]=useState('2025-06');
  const fid=parseInt(sel),func=funcs.find(f=>f.id===fid);
  const rel=sel?()=>{
    const pf=pontos.filter(p=>p.funcionarioId===fid&&p.data.startsWith(mes));
    let tot=0,ext=0,fal=0,atr=0;const dt=pf.filter(p=>p.status==='Completo').length;
    pf.forEach(p=>{if(p.entrada&&p.saida){let m=toMin(p.saida)-toMin(p.entrada);if(p.almocoSaida&&p.almocoRetorno)m-=(toMin(p.almocoRetorno)-toMin(p.almocoSaida));tot+=m;if(m>480)ext+=(m-480);else if(m<480)fal+=(480-m);if(toMin(p.entrada)>8*60+5)atr++}});
    const df=folgas.filter(f=>f.funcionarioId===fid&&f.status==='Aprovado'&&f.inicio.startsWith(mes)).length;
    return{tot,ext,fal,atr,dt,df,bh:ext-fal,reg:pf};
  }():null;
  return(
    <div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
        <select className="select" value={sel} onChange={e=>setSel(e.target.value)}><option value="">Selecione o funcionário...</option>{funcs.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select>
        <input className="input" type="month" value={mes} onChange={e=>setMes(e.target.value)}/>
      </div>
      {rel?(
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div className="avatar" style={{width:40,height:40,fontSize:14}}>{ini(func.nome)}</div>
              <div><div style={{fontWeight:600,fontSize:14}}>{func.nome}</div><div style={{fontSize:12,color:'var(--text3)'}}>{func.cargo} • {func.contrato}</div></div>
              <span className="badge badge-blue" style={{marginLeft:'auto'}}>{mes}</span>
            </div>
            <div className="grid-2" style={{gap:8,marginBottom:8}}>
              <div className="stat-card"><div className="stat-label">Trabalhadas</div><div className="stat-value" style={{fontSize:20}}>{fmtH(rel.tot)}</div><div className="horas-bar"><div className="horas-fill" style={{width:`${Math.min(100,Math.round(rel.tot/(160*60)*100))}%`,background:'var(--accent)'}}></div></div></div>
              <div className="stat-card"><div className="stat-label">Extras</div><div className="stat-value" style={{fontSize:20,color:'var(--green)'}}>{fmtH(rel.ext)}</div></div>
              <div className="stat-card"><div className="stat-label">Faltantes</div><div className="stat-value" style={{fontSize:20,color:rel.fal>0?'var(--red)':undefined}}>{fmtH(rel.fal)}</div></div>
              <div className="stat-card"><div className="stat-label">Banco de horas</div><div className="stat-value" style={{fontSize:20,color:rel.bh>=0?'var(--green)':'var(--red)'}}>{rel.bh>=0?'+':''}{fmtH(Math.abs(rel.bh))}</div></div>
            </div>
            <div className="grid-3" style={{gap:8}}>
              <div className="stat-card"><div className="stat-label">Dias trab.</div><div className="stat-value" style={{fontSize:20}}>{rel.dt}</div></div>
              <div className="stat-card"><div className="stat-label">Dias folga</div><div className="stat-value" style={{fontSize:20}}>{rel.df}</div></div>
              <div className="stat-card"><div className="stat-label">Atrasos</div><div className="stat-value" style={{fontSize:20,color:rel.atr>0?'var(--yellow)':undefined}}>{rel.atr}</div></div>
            </div>
          </div>
          <div className="mobile-list">
            {rel.reg.sort((a,b)=>a.data.localeCompare(b.data)).map(p=>{
              let m=0;if(p.entrada&&p.saida){m=toMin(p.saida)-toMin(p.entrada);if(p.almocoSaida&&p.almocoRetorno)m-=(toMin(p.almocoRetorno)-toMin(p.almocoSaida))}
              return(<div key={p.id} className="mcard"><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><strong style={{fontSize:13}}>{p.data}</strong><span className={`badge ${p.status==='Completo'?'badge-green':'badge-yellow'}`}>{p.status}</span></div><div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:12,color:'var(--text2)'}}><span>Entrada: <strong style={{color:'var(--text)'}}>{p.entrada||'—'}</strong></span><span>Saída: <strong style={{color:'var(--text)'}}>{p.saida||'—'}</strong></span>{m>0&&<span>Total: <strong style={{color:m>480?'var(--green)':'var(--text)'}}>{fmtH(m)}</strong></span>}</div></div>);
            })}
            {rel.reg.length===0&&<div className="empty-state">Nenhum registro neste mês</div>}
          </div>
          <div className="desktop-table"><div className="card" style={{padding:0}}>
            <table className="table"><thead><tr><th>Data</th><th>Entrada</th><th>S. Almoço</th><th>Retorno</th><th>Saída</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>{rel.reg.sort((a,b)=>a.data.localeCompare(b.data)).map(p=>{
              let m=0;if(p.entrada&&p.saida){m=toMin(p.saida)-toMin(p.entrada);if(p.almocoSaida&&p.almocoRetorno)m-=(toMin(p.almocoRetorno)-toMin(p.almocoSaida))}
              return(<tr key={p.id}><td>{p.data}</td><td>{p.entrada||'—'}</td><td>{p.almocoSaida||'—'}</td><td>{p.almocoRetorno||'—'}</td><td>{p.saida||'—'}</td><td style={{color:m>480?'var(--green)':undefined}}>{m>0?fmtH(m):'—'}</td><td><span className={`badge ${p.status==='Completo'?'badge-green':'badge-yellow'}`}>{p.status}</span></td></tr>);
            })}</tbody></table>
          </div></div>
        </div>
      ):(
        <div className="empty-state" style={{paddingTop:60}}>
          <i className="ti ti-chart-bar" style={{fontSize:48,color:'var(--text3)',display:'block',marginBottom:12}}></i>
          Selecione um funcionário e mês para gerar o relatório
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
