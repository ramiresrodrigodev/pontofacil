<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PontoFácil – Sistema de RH</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;
  --border:#2a3347;--border2:#3a4660;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#2563eb;--accent-bg:#1e3a5f;
  --green:#22c55e;--green-bg:#14532d;
  --yellow:#eab308;--yellow-bg:#422006;
  --red:#ef4444;--red-bg:#450a0a;
  --purple:#a855f7;--purple-bg:#3b0764;
  --cyan:#06b6d4;--cyan-bg:#0c4a6e;
  --bnav:60px;
}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:16px;background:var(--bg);padding-bottom:calc(var(--bnav) + 16px)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;padding:6px 2px;border:none;background:none}
.bnav-item i{font-size:20px}
.bnav-item.active{color:var(--accent)}
@media(min-width:768px){
  .app{flex-direction:row}
  .bottom-nav{display:none}
  .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex!important;flex-direction:column;flex-shrink:0}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .content{padding:24px;padding-bottom:24px}
}
.sidebar{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-size:18px;font-weight:700;color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.snav{padding:12px 8px;flex:1}
.snav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.snav-item:hover{background:var(--bg3);color:var(--text)}
.snav-item.active{background:var(--accent-bg);color:var(--accent)}
.snav-item i{font-size:16px;width:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:767px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
@media(max-width:400px){.g3{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.slabel{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.sval{font-size:22px;font-weight:700}
.ssub{font-size:11px;color:var(--text3);margin-top:2px}
.sec{font-size:14px;font-weight:600;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:var(--green-bg);color:var(--green)}
.br{background:var(--red-bg);color:var(--red)}
.by{background:var(--yellow-bg);color:var(--yellow)}
.bb{background:var(--accent-bg);color:var(--accent)}
.bp{background:var(--purple-bg);color:var(--purple)}
.bc{background:var(--cyan-bg);color:var(--cyan)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:none;font-weight:500;touch-action:manipulation}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-d{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.btn-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}
.sel{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;cursor:pointer}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;color:var(--text3);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.ml{display:none;flex-direction:column;gap:8px}
.dt{display:block}
@media(max-width:767px){.ml{display:flex}.dt{display:none}}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90dvh;overflow-y:auto}
.modal-t{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-a{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
@media(min-width:600px){.ov{align-items:center}.modal{border-radius:12px;width:500px;max-width:95vw}}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.ag{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.ar{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.ay{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow)}
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:8px;margin-bottom:16px;overflow-x:auto}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2);font-weight:500;white-space:nowrap;border:none;background:none}
.tab.active{background:var(--bg2);color:var(--text)}
.hbar{height:6px;border-radius:3px;background:var(--bg4);overflow:hidden;margin-top:6px}
.hfill{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-weight:700;flex-shrink:0}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pbtn{padding:14px 8px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:none;touch-action:manipulation;width:100%}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Data ──────────────────────────────────────────────────────────
const INI_FUNCS=[
  {id:1,nome:'Ana Lima',cargo:'Desenvolvedora',departamento:'TI',salario:8500,contrato:'CLT',status:'Ativo',email:'ana@empresa.com',telefone:'11 99999-0001',dataAdmissao:'2022-03-01',escala:'5x2'},
  {id:2,nome:'Bruno Costa',cargo:'Designer',departamento:'Marketing',salario:6200,contrato:'CLT',status:'Ativo',email:'bruno@empresa.com',telefone:'11 99999-0002',dataAdmissao:'2021-07-15',escala:'5x2'},
  {id:3,nome:'Carla Souza',cargo:'Analista Financeiro',departamento:'Financeiro',salario:7800,contrato:'CLT',status:'Ativo',email:'carla@empresa.com',telefone:'11 99999-0003',dataAdmissao:'2023-01-10',escala:'5x2'},
  {id:4,nome:'Daniel Rocha',cargo:'Estágio em TI',departamento:'TI',salario:1800,contrato:'Estágio',status:'Ativo',email:'daniel@empresa.com',telefone:'11 99999-0004',dataAdmissao:'2024-02-01',escala:'5x2'},
  {id:5,nome:'Emília Nunes',cargo:'Consultora PJ',departamento:'Comercial',salario:12000,contrato:'PJ',status:'Inativo',email:'emilia@empresa.com',telefone:'11 99999-0005',dataAdmissao:'2020-05-20',escala:'5x2'},
];
const INI_PONTOS=[
  {id:1,fid:1,data:'2025-06-02',entrada:'08:02',alSaida:'12:05',alRetorno:'13:10',saida:'17:30',status:'Completo'},
  {id:2,fid:1,data:'2025-06-03',entrada:'08:15',alSaida:'12:00',alRetorno:'13:05',saida:'17:45',status:'Completo'},
  {id:3,fid:2,data:'2025-06-02',entrada:'09:00',alSaida:'12:30',alRetorno:'13:30',saida:'18:00',status:'Completo'},
  {id:4,fid:2,data:'2025-06-03',entrada:'09:20',alSaida:'12:30',alRetorno:'13:30',saida:'18:10',status:'Completo'},
  {id:5,fid:3,data:'2025-06-03',entrada:'07:55',alSaida:'12:00',alRetorno:'13:00',saida:'17:00',status:'Completo'},
];
const INI_FOLGAS=[
  {id:1,fid:1,tipo:'Férias',inicio:'2025-07-01',fim:'2025-07-15',status:'Aprovado',obs:'Férias anuais'},
  {id:2,fid:2,tipo:'Atestado',inicio:'2025-06-01',fim:'2025-06-01',status:'Aprovado',obs:'Consulta médica'},
  {id:3,fid:3,tipo:'Folga semanal',inicio:'2025-06-07',fim:'2025-06-07',status:'Aprovado',obs:''},
  {id:4,fid:4,tipo:'Banco de horas',inicio:'2025-06-05',fim:'2025-06-05',status:'Pendente',obs:'Compensação horas extras'},
];

// ── Helpers ───────────────────────────────────────────────────────
const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m};
const fmtH=m=>{const h=Math.floor(m/60),mn=m%60;return`${h}h${mn>0?String(mn).padStart(2,'0')+'min':''}`};
const ini=n=>n.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase();
const fmtTime=d=>d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmtDate=d=>d.toLocaleDateString('pt-BR');
const calcMins=(p)=>{
  if(!p.entrada||!p.saida)return 0;
  let m=toMin(p.saida)-toMin(p.entrada);
  if(p.alSaida&&p.alRetorno)m-=toMin(p.alRetorno)-toMin(p.alSaida);
  return m;
};

// ── State ─────────────────────────────────────────────────────────
let state={
  page:'dashboard',
  funcs:INI_FUNCS,
  pontos:INI_PONTOS,
  folgas:INI_FOLGAS,
  pa:{},
  alert:null,
  clock:new Date(),
  modal:null,
  tab:'registrar',
  selFunc:'',
  filtro:'',
  filtroStatus:'Todos',
  filtroFolga:'Todos',
  relFunc:'',
  relMes:'2025-06',
  formFunc:{nome:'',cargo:'',departamento:'',salario:'',contrato:'CLT',status:'Ativo',email:'',telefone:'',dataAdmissao:'',escala:'5x2'},
  formManual:{fid:'',data:'',entrada:'',alSaida:'',alRetorno:'',saida:'',obs:''},
  formFolga:{fid:'',tipo:'Folga semanal',inicio:'',fim:'',obs:''},
};

function setState(patch){state={...state,...patch};render()}

// ── Alert ─────────────────────────────────────────────────────────
function showAlert(msg,type='g'){
  state.alert={msg,type};
  clearTimeout(state._at);
  state._at=setTimeout(()=>{state.alert=null;render()},3000);
  render();
}

// ── Clock ─────────────────────────────────────────────────────────
setInterval(()=>{state.clock=new Date();render()},1000);

// ── DOM helpers ───────────────────────────────────────────────────
const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='class')el.className=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c===null||c===undefined)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
};
const div=(cls,children=[],style={})=>h('div',{class:cls,style},children);
const span=(cls,txt,style={})=>h('span',{class:cls,style},[txt]);
const btn=(cls,children,onClick)=>h('button',{class:`btn ${cls}`,onclick:onClick},children);
const icon=name=>h('i',{class:`ti ${name}`});
const av=(nome,size=32,fs=11)=>{
  const d=document.createElement('div');
  d.className='av';
  Object.assign(d.style,{width:size+'px',height:size+'px',fontSize:fs+'px'});
  d.textContent=ini(nome);
  return d;
};

// ── Badge ─────────────────────────────────────────────────────────
const badge=(txt,cls)=>span(`badge ${cls}`,txt);
const badgeContrato=c=>badge(c,c==='CLT'?'bb':c==='PJ'?'bp':'bc');
const badgeStatus=s=>badge(s,s==='Ativo'||s==='Aprovado'?'bg':s==='Inativo'||s==='Recusado'?'br':'by');

// ── Nav ───────────────────────────────────────────────────────────
const PAGES=[
  {id:'dashboard',icon:'ti-layout-dashboard',label:'Início'},
  {id:'funcionarios',icon:'ti-users',label:'Equipe'},
  {id:'ponto',icon:'ti-clock',label:'Ponto'},
  {id:'folgas',icon:'ti-beach',label:'Folgas'},
  {id:'relatorios',icon:'ti-chart-bar',label:'Relatórios'},
  {id:'escalas',icon:'ti-calendar-month',label:'Escalas'},
];

function buildSidebar(){
  const s=document.createElement('aside');
  s.className='sidebar';
  const logo=div('logo',[
    div('logo-text',['PontoFácil']),
    div('logo-sub',['Sistema de RH']),
  ]);
  const nav=div('snav',PAGES.map(p=>{
    const item=h('button',{class:`snav-item${state.page===p.id?' active':''}`,onclick:()=>setState({page:p.id})},[icon(p.icon),h('span',{},[p.label])]);
    return item;
  }));
  const foot=div('',[h('button',{class:'snav-item',style:{width:'100%'}},[icon('ti-settings'),h('span',{},['Configurações'])])],{padding:'12px 8px',borderTop:'1px solid var(--border)'});
  s.appendChild(logo);s.appendChild(nav);s.appendChild(foot);
  return s;
}

function buildTopbar(){
  const label=PAGES.find(p=>p.id===state.page)?.label||'';
  return div('topbar',[
    div('topbar-title',[label]),
    div('',[
      h('span',{style:{fontSize:'12px',color:'var(--text3)'}},[fmtTime(state.clock)]),
      av('GE',28,9),
    ],{display:'flex',alignItems:'center',gap:'8px'}),
  ]);
}

function buildBottomNav(){
  const nav=div('bottom-nav',PAGES.map(p=>{
    const item=h('button',{class:`bnav-item${state.page===p.id?' active':''}`,onclick:()=>setState({page:p.id})},[icon(p.icon),h('span',{},[p.label])]);
    return item;
  }));
  return nav;
}

// ── Dashboard ─────────────────────────────────────────────────────
function buildDashboard(){
  const {funcs,pontos,folgas}=state;
  const ativos=funcs.filter(f=>f.status==='Ativo').length;
  const totalMin=pontos.reduce((a,p)=>a+calcMins(p),0);
  const pendentes=folgas.filter(f=>f.status==='Pendente').length;
  const recentes=[...pontos].reverse().slice(0,4);
  const proxFolgas=folgas.filter(f=>f.status==='Aprovado').slice(0,3);

  const stats=div('g4',[
    div('scard',[div('slabel',['Ativos']),div('sval',[String(ativos)]),div('ssub',[funcs.length+' total'])]),
    div('scard',[div('slabel',['Horas/mês']),div('sval',[Math.floor(totalMin/60)+'h']),div('ssub',['registradas'])]),
    div('scard',[div('slabel',['Pendentes']),h('div',{class:'sval',style:{color:pendentes>0?'var(--yellow)':''}},[String(pendentes)]),div('ssub',['folgas'])]),
    div('scard',[div('slabel',['Pontos']),div('sval',[String(pontos.length)]),div('ssub',['registros'])]),
  ],{marginBottom:'14px'});

  const rows=recentes.map(p=>{
    const f=funcs.find(f=>f.id===p.fid);
    return div('',[
      div('',[av(f?.nome||'?',28,10),div('',[h('div',{style:{fontSize:'13px',fontWeight:'500'}},[f?.nome||'—']),h('div',{style:{fontSize:'11px',color:'var(--text3)'}},[p.data])],{})],{display:'flex',alignItems:'center',gap:'8px'}),
      div('',[h('div',{style:{fontSize:'12px',color:'var(--text2)'}},[p.entrada+' → '+(p.saida||'—')]),badgeStatus(p.status)],{textAlign:'right'}),
    ],{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'});
  });
  const cardPontos=div('card',[div('sec',['Últimos registros']),...rows,btn('btn-s btn-full',['Ver todos'],()=>setState({page:'ponto'}))],{marginBottom:'12px'});

  const fRows=proxFolgas.map(f=>{
    const func=funcs.find(fu=>fu.id===f.fid);
    return div('',[
      div('',[h('div',{style:{fontSize:'13px',fontWeight:'500'}},[func?.nome||'—']),h('div',{style:{fontSize:'11px',color:'var(--text3)'}},[f.inicio+' • '+f.tipo])]),
      badgeStatus('Aprovado'),
    ],{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'});
  });
  const cardFolgas=div('card',[div('sec',['Próximas folgas']),...fRows],{marginBottom:'12px'});

  const chips=funcs.filter(f=>f.status==='Ativo').map(f=>{
    const c=div('chip',[av(f.nome,18,8),f.nome.split(' ')[0]]);
    return c;
  });
  const cardEquipe=div('card',[div('sec',['Equipe ativa']),div('',chips,{display:'flex',flexWrap:'wrap',gap:'8px'})]);

  return div('',[stats,cardPontos,cardFolgas,cardEquipe]);
}

// ── Funcionários ──────────────────────────────────────────────────
function buildFuncionarios(){
  const {funcs,filtro,filtroStatus}=state;
  const lista=funcs.filter(f=>(filtroStatus==='Todos'||f.status===filtroStatus)&&(f.nome.toLowerCase().includes(filtro.toLowerCase())||f.cargo.toLowerCase().includes(filtro.toLowerCase())));

  const searchRow=div('',[
    h('input',{class:'inp',placeholder:'Buscar...',value:filtro,oninput:e=>setState({filtro:e.target.value})}),
    h('select',{class:'sel',style:{width:'110px'},onchange:e=>setState({filtroStatus:e.target.value})},
      ['Todos','Ativo','Inativo'].map(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===filtroStatus)opt.selected=true;return opt;})
    ),
  ],{display:'flex',gap:'8px',marginBottom:'12px'});

  const btnNovo=btn('btn-p btn-full',[icon('ti-plus'),'Novo Funcionário'],()=>{
    setState({modal:'novo-func',formFunc:{nome:'',cargo:'',departamento:'',salario:'',contrato:'CLT',status:'Ativo',email:'',telefone:'',dataAdmissao:'',escala:'5x2'}});
  });
  const btnWrap=div('',[ btnNovo],{marginBottom:'12px'});

  // Mobile cards
  const mCards=div('ml',lista.map(f=>{
    const mc=div('mc',[
      div('',[av(f.nome),div('',[h('div',{style:{fontWeight:'600',fontSize:'14px'}},[f.nome]),h('div',{style:{fontSize:'12px',color:'var(--text3)'}},[f.cargo+' • '+f.departamento])],{flex:'1'}),badgeStatus(f.status)],{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}),
      div('',[badgeContrato(f.contrato),div('chip',[f.escala],{fontSize:'11px'}),h('span',{style:{fontSize:'12px',color:'var(--text2)'}},[`R$ ${Number(f.salario).toLocaleString('pt-BR')}`])],{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'10px'}),
      div('',[
        btn('btn-s btn-sm',[ icon('ti-edit'),'Editar'],()=>abrirEditarFunc(f)),
        btn('btn-d btn-sm',[icon('ti-trash')],()=>excluirFunc(f.id)),
      ],{display:'flex',gap:'8px'}),
    ]);
    return mc;
  }));
  if(lista.length===0)mCards.appendChild(div('empty',['Nenhum funcionário encontrado']));

  // Desktop table
  const thead=h('thead',{},[h('tr',{},[['Funcionário','Cargo','Contrato','Salário','Escala','Status',''].map(t=>h('th',{},[t]))])]);
  thead.querySelector('tr').replaceChildren(...['Funcionário','Cargo','Contrato','Salário','Escala','Status',''].map(t=>h('th',{},[t])));
  const tbody=h('tbody',{},lista.map(f=>{

  } else if(modal==='manual'){
    title='Registro Manual';
    const selFEl=h('select',{class:'sel',onchange:e=>state.formManual={...state.formManual,fid:e.target.value}},[h('option',{value:''},['Selecione...']),...funcs.map(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.nome;if(String(f.id)===formManual.fid)o.selected=true;return o;})]);
    body=[
      div('fg',[h('label',{class:'fl'},['Funcionário *']),selFEl]),
      inp('formManual','Data *','date',formManual.data,'data'),
      div('g2',[inp('formManual','Entrada *','time',formManual.entrada,'entrada'),inp('formManual','Saída almoço','time',formManual.alSaida,'alSaida')]),
      div('g2',[inp('formManual','Retorno','time',formManual.alRetorno,'alRetorno'),inp('formManual','Saída final','time',formManual.saida,'saida')]),
      inp('formManual','Observação','text',formManual.obs,'obs'),
    ];
    onSave=()=>{
      const {formManual}=state;
      if(!formManual.fid||!formManual.data||!formManual.entrada){showAlert('Preencha os campos obrigatórios','r');return}
      state.pontos=[...state.pontos,{id:Date.now(),...formManual,fid:parseInt(formManual.fid),status:formManual.saida?'Completo':'Incompleto'}];
      setState({modal:null});showAlert('Ponto registrado!');
    };
  } else if(modal==='nova-folga'){
    title='Nova Solicitação de Folga';
    const tipos=['Folga semanal','Banco de horas','Férias','Atestado','Feriado','Licença'];
    const selFEl=h('select',{class:'sel',onchange:e=>state.formFolga={...state.formFolga,fid:e.target.value}},[h('option',{value:''},['Selecione...']),...funcs.filter(f=>f.status==='Ativo').map(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.nome;if(String(f.id)===formFolga.fid)o.selected=true;return o;})]);
    body=[
      div('fg',[h('label',{class:'fl'},['Funcionário *']),selFEl]),
      sel2('formFolga','Tipo',formFolga.tipo,'tipo',tipos),
      div('g2',[inp('formFolga','Início *','date',formFolga.inicio,'inicio'),inp('formFolga','Fim','date',formFolga.fim,'fim')]),
      inp('formFolga','Observação','text',formFolga.obs,'obs'),
    ];
    onSave=()=>{
      const {formFolga}=state;
      if(!formFolga.fid||!formFolga.inicio){showAlert('Preencha os campos obrigatórios','r');return}
      state.folgas=[...state.folgas,{id:Date.now(),...formFolga,fid:parseInt(formFolga.fid),status:'Pendente'}];
      setState({modal:null});showAlert('Solicitação criada!');
    };
  }

  const modalEl=div('modal',[
    div('modal-t',[title]),
    ...body,
    div('modal-a',[
      btn('btn-s',['Cancelar'],()=>setState({modal:null})),
      btn('btn-p',['Salvar'],onSave),
    ]),
  ]);
  const overlay=div('ov',[modalEl]);
  overlay.addEventListener('click',e=>{if(e.target===overlay)setState({modal:null})});
  return overlay;
}

// ── Main render ───────────────────────────────────────────────────
function render(){
  const root=document.getElementById('app');
  root.innerHTML='';
  const app=div('app',[]);
  app.appendChild(buildSidebar());
  const main=div('main',[]);
  main.appendChild(buildTopbar());
  if(state.alert){
    const aw=div('',[ div(`alert a${state.alert.type}`,[state.alert.msg])],{padding:'10px 16px 0'});
    main.appendChild(aw);
  }
  const content=div('content',[]);
  const pages={dashboard:buildDashboard,funcionarios:buildFuncionarios,ponto:buildPonto,escalas:buildEscalas,folgas:buildFolgas,relatorios:buildRelatorios};
  content.appendChild((pages[state.page]||buildDashboard)());
  main.appendChild(content);
  app.appendChild(main);
  app.appendChild(buildBottomNav());
  const modal=buildModal();
  if(modal)app.appendChild(modal);
  root.appendChild(app);
}

render();
</script>
</body>
</html>
